<!DOCTYPE html>
<html lang="en-US">
  <head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Veryl Playground</title>
    <link rel="canonical" href="https://doc.veryl-lang.org/playground/" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
    {
      "imports": {
        "@codemirror/state": "https://esm.sh/*@codemirror/state@6.5.2",
        "@codemirror/view": "https://esm.sh/*@codemirror/view@6.36.5",
        "@codemirror/language": "https://esm.sh/*@codemirror/language@6.11.0",
        "@codemirror/commands": "https://esm.sh/*@codemirror/commands@6.8.1",
        "@codemirror/search": "https://esm.sh/*@codemirror/search@6.5.10",
        "@codemirror/autocomplete": "https://esm.sh/*@codemirror/autocomplete@6.18.6",
        "@codemirror/legacy-modes/mode/verilog": "https://esm.sh/*@codemirror/legacy-modes@6.5.1/mode/verilog",
        "@lezer/common": "https://esm.sh/*@lezer/common@1.2.3",
        "@lezer/highlight": "https://esm.sh/*@lezer/highlight@1.2.1",
        "@lezer/lr": "https://esm.sh/*@lezer/lr@1.4.2",
        "style-mod": "https://esm.sh/style-mod@4.1.2",
        "w3c-keyname": "https://esm.sh/w3c-keyname@2.2.8",
        "crelt": "https://esm.sh/crelt@1.0.6",
        "@marijn/find-cluster-break": "https://esm.sh/@marijn/find-cluster-break@1.0.2"
      }
    }
    </script>
  </head>
  <body data-theme="light">
    <!-- Hidden textarea for test compatibility -->
    <textarea id="default-source" style="display:none">
// module definition
module ModuleA #(
    param ParamA: u32 = 10,
    const ParamB: u32 = 10, // trailing comma is allowed
) (
    i_clk : input  clock            ,
    i_rst : input  reset            ,
    i_sel : input  logic            ,
    i_data: input  logic<ParamA> [2], // `[]` means unpacked array
    o_data: output logic<ParamA>    , // `<>` means packed array
) {
    // const parameter declaration
    //   `param` is not allowed in module
    const ParamC: u32 = 10;

    // variable declaration
    var r_data0: logic<ParamA>;
    var r_data1: logic<ParamA>;

    // value binding
    let _w_data2: logic<ParamA> = i_data[0];

    // always_ff statement with reset
    //   `always_ff` can take a mandatory clock and a optional reset
    //   `if_reset` means `if (i_rst)`. This conceals reset porality
    //   `()` of `if` is not required
    //   `=` in `always_ff` is non-blocking assignment
    always_ff (i_clk, i_rst) {
        if_reset {
            r_data0 = 0;
        } else if i_sel {
            r_data0 = i_data[0];
        } else {
            r_data0 = i_data[1];
        }
    }

    // always_ff statement without reset
    always_ff (i_clk) {
        r_data1 = r_data0;
    }

    assign o_data = r_data1;
}
    </textarea>

    <!-- Toolbar -->
    <header class="toolbar">
      <div class="toolbar-brand">
        <span class="logo">V</span>
        <span class="title">Veryl Playground</span>
      </div>
      <div class="toolbar-actions">
        <button id="btn-build" class="btn btn-primary" title="Build (Ctrl+Enter)">
          <svg viewBox="0 0 16 16" width="14" height="14"><path d="M4 2l10 6-10 6V2z" fill="currentColor"/></svg>
          Build
        </button>
        <button id="btn-format" class="btn btn-ghost" title="Format (Ctrl+Shift+F)">Format</button>
        <select id="exampleSelect">
          <option disabled selected value>Select Example</option>
          <option value="hello.veryl">Hello, World!</option>
          <option value="halfadder.veryl">Half Adder</option>
        </select>
      </div>
      <div class="toolbar-right">
        <button id="btn-share" class="btn-icon" title="Share URL">
          <svg viewBox="0 0 16 16" width="16" height="16"><path d="M11 2.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3zm0 8a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3zM5 6.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3zm4.44-1.34l-2.88 1.68m2.88 2.32l-2.88-1.68" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
        </button>
        <button id="btn-help" class="btn-icon" title="Keyboard Shortcuts">?</button>
        <button id="btn-theme" class="btn-icon" title="Toggle Theme">
          <span class="theme-icon">&#9789;</span>
        </button>
      </div>
    </header>

    <!-- Mobile Tabs -->
    <div class="mobile-tabs">
      <button class="mobile-tab active" data-panel="source">Source</button>
      <button class="mobile-tab" data-panel="output">Output</button>
    </div>

    <!-- Main Panels -->
    <main class="panels">
      <div class="panel panel-source mobile-active">
        <div class="panel-header">
          <span class="panel-tab active">source.veryl</span>
        </div>
        <div id="editor-container" class="panel-body"></div>
      </div>

      <div class="gutter" id="gutter"></div>

      <div class="panel panel-output">
        <div class="panel-header">
          <span class="panel-tab active">output.sv</span>
          <button id="btn-copy" class="btn-icon-sm" title="Copy output">&#128203;</button>
        </div>
        <div id="output-container" class="panel-body"></div>
      </div>
    </main>

    <!-- Bottom Panel -->
    <div class="bottom-panel" id="bottom-panel">
      <div class="bottom-panel-header">
        <button class="bottom-tab active" data-panel="problems">
          Problems <span id="problem-count" class="badge">0</span>
        </button>
        <button id="btn-toggle-bottom" class="btn-icon-sm" title="Toggle panel">&#9660;</button>
      </div>
      <div class="bottom-panel-body" id="bottom-panel-body">No problems detected.</div>
    </div>

    <!-- Status Bar -->
    <footer class="statusbar">
      <span id="status-text"><span class="status-dot"></span> Ready</span>
      <span id="build-time"></span>
    </footer>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Help Overlay -->
    <div class="help-overlay" id="help-overlay">
      <div class="help-dialog">
        <h2>Keyboard Shortcuts</h2>
        <table>
          <tr><td><kbd>Ctrl</kbd>+<kbd>Enter</kbd></td><td>Build</td></tr>
          <tr><td><kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>F</kbd></td><td>Format</td></tr>
          <tr><td><kbd>Ctrl</kbd>+<kbd>S</kbd></td><td>Format</td></tr>
          <tr><td><kbd>Escape</kbd></td><td>Close dialog</td></tr>
        </table>
        <button class="close-btn" id="btn-close-help">Close</button>
      </div>
    </div>

    <script type="module">
      // ===== WASM imports =====
      import init, {set_hook, build as wasmBuild, format as wasmFormat} from "./pkg/veryl_wasm.js";

      // ===== CodeMirror imports =====
      import {EditorView, keymap, lineNumbers, highlightActiveLine, highlightActiveLineGutter} from "@codemirror/view";
      import {EditorState} from "@codemirror/state";
      import {StreamLanguage, syntaxHighlighting, defaultHighlightStyle, bracketMatching, indentOnInput} from "@codemirror/language";
      import {defaultKeymap, history, historyKeymap, indentWithTab} from "@codemirror/commands";
      import {searchKeymap, highlightSelectionMatches} from "@codemirror/search";
      import {closeBrackets, closeBracketsKeymap} from "@codemirror/autocomplete";
      import {verilog} from "@codemirror/legacy-modes/mode/verilog";

      // ===== Veryl Language Mode =====
      import {verylMode} from "./veryl-mode.js";
      const verylLang = StreamLanguage.define(verylMode);

      // ===== CodeMirror themes =====
      import {Compartment} from "@codemirror/state";
      const themeCompartment = new Compartment();
      const outputThemeCompartment = new Compartment();

      const lightTheme = EditorView.theme({
        "&": { backgroundColor: "var(--bg-editor)" },
        ".cm-cursor, .cm-dropCursor": { borderLeftColor: "#111827" },
        ".cm-gutters": { backgroundColor: "var(--bg-editor)", borderRight: "1px solid var(--border)", color: "var(--text-muted)" },
        ".cm-activeLineGutter": { backgroundColor: "var(--accent-subtle)", color: "var(--text-secondary)" },
        ".cm-activeLine": { backgroundColor: "var(--accent-subtle)" },
      });

      const darkTheme = EditorView.theme({
        "&": { backgroundColor: "var(--bg-editor)" },
        ".cm-cursor, .cm-dropCursor": { borderLeftColor: "#c0caf5" },
        ".cm-gutters": { backgroundColor: "var(--bg-editor)", borderRight: "1px solid var(--border)", color: "var(--text-muted)" },
        ".cm-activeLineGutter": { backgroundColor: "var(--accent-subtle)", color: "var(--text-secondary)" },
        ".cm-activeLine": { backgroundColor: "var(--accent-subtle)" },
      }, { dark: true });

      function cmThemeFor(name) {
        return name === "dark" ? darkTheme : lightTheme;
      }

      // ===== Default source code =====
      const defaultSource = document.getElementById("default-source").value;

      // ===== Decode URL hash =====
      const STORAGE_KEY_SOURCE = "veryl-playground-source";

      function getInitialSource() {
        const hash = location.hash;
        if (hash.startsWith("#code=")) {
          try {
            return decodeURIComponent(escape(atob(hash.slice(6))));
          } catch (e) { /* fall through */ }
        }
        const saved = localStorage.getItem(STORAGE_KEY_SOURCE);
        if (saved !== null) return saved;
        return defaultSource;
      }

      // ===== Theme =====
      function getInitialTheme() {
        const saved = localStorage.getItem("veryl-playground-theme");
        if (saved) return saved;
        return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }

      function applyTheme(theme, updateEditors) {
        document.body.setAttribute("data-theme", theme);
        localStorage.setItem("veryl-playground-theme", theme);
        const icon = document.querySelector(".theme-icon");
        icon.textContent = theme === "dark" ? "\u2600" : "\u263D";
        if (updateEditors && typeof sourceEditor !== "undefined") {
          sourceEditor.dispatch({ effects: themeCompartment.reconfigure(cmThemeFor(theme)) });
          outputEditor.dispatch({ effects: outputThemeCompartment.reconfigure(cmThemeFor(theme)) });
        }
      }

      applyTheme(getInitialTheme());

      // ===== Create CodeMirror editors =====
      const initialThemeName = getInitialTheme();
      const sourceExtensions = [
        lineNumbers(),
        highlightActiveLine(),
        highlightActiveLineGutter(),
        bracketMatching(),
        closeBrackets(),
        indentOnInput(),
        history(),
        highlightSelectionMatches(),
        verylLang,
        syntaxHighlighting(defaultHighlightStyle),
        themeCompartment.of(cmThemeFor(initialThemeName)),
        keymap.of([
          { key: "Ctrl-Enter", mac: "Cmd-Enter", run: () => { window.build(); return true; } },
          { key: "Ctrl-Shift-f", mac: "Cmd-Shift-f", run: () => { window.format(); return true; } },
          { key: "Ctrl-s", mac: "Cmd-s", run: () => { window.format(); return true; } },
          ...closeBracketsKeymap,
          ...defaultKeymap,
          ...historyKeymap,
          ...searchKeymap,
          indentWithTab,
        ]),
        EditorView.lineWrapping,
        EditorView.updateListener.of((update) => {
          if (update.docChanged) {
            localStorage.setItem(STORAGE_KEY_SOURCE, update.state.doc.toString());
          }
        }),
      ];

      const sourceEditor = new EditorView({
        state: EditorState.create({
          doc: getInitialSource(),
          extensions: sourceExtensions,
        }),
        parent: document.getElementById("editor-container"),
      });

      const outputExtensions = [
        lineNumbers(),
        StreamLanguage.define(verilog),
        syntaxHighlighting(defaultHighlightStyle),
        outputThemeCompartment.of(cmThemeFor(initialThemeName)),
        EditorState.readOnly.of(true),
        EditorView.lineWrapping,
      ];

      const outputEditor = new EditorView({
        state: EditorState.create({
          doc: "",
          extensions: outputExtensions,
        }),
        parent: document.getElementById("output-container"),
      });

      function setOutput(text) {
        outputEditor.dispatch({
          changes: { from: 0, to: outputEditor.state.doc.length, insert: text }
        });
      }

      function getSource() {
        return sourceEditor.state.doc.toString();
      }

      function setSource(text) {
        sourceEditor.dispatch({
          changes: { from: 0, to: sourceEditor.state.doc.length, insert: text }
        });
      }

      // ===== Status helpers =====
      const statusText = document.getElementById("status-text");
      const buildTimeEl = document.getElementById("build-time");
      const problemCount = document.getElementById("problem-count");
      const bottomBody = document.getElementById("bottom-panel-body");

      function setStatus(type, msg) {
        const dot = `<span class="status-dot ${type === 'error' ? 'error' : type === 'building' ? 'building' : ''}"></span>`;
        statusText.innerHTML = `${dot} ${msg}`;
      }

      function setProblems(text, count) {
        bottomBody.textContent = text || "No problems detected.";
        problemCount.textContent = count;
        const badge = problemCount;
        badge.className = "badge" + (count > 0 ? " has-errors" : "");
      }

      // ===== Toast =====
      let toastTimer = null;
      function showToast(msg) {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove("show"), 2000);
      }

      // ===== WASM init =====
      await init();
      set_hook();

      // ===== Build =====
      window.build = () => {
        setStatus("building", "Building...");
        const t0 = performance.now();
        try {
          const src = getSource();
          const result = wasmBuild(src);
          const content = result.content();
          const err = result.err();
          const elapsed = (performance.now() - t0).toFixed(0);
          if (err) {
            setOutput("");
            setProblems(content, 1);
            setStatus("error", "Build failed");
            // Expand bottom panel if collapsed
            document.getElementById("bottom-panel").classList.remove("collapsed");
          } else {
            setOutput(content);
            setProblems("", 0);
            setStatus("ok", "Ready");
          }
          buildTimeEl.textContent = `Built in ${elapsed}ms`;
        } catch (error) {
          setOutput("");
          setProblems("Unexpected error: " + error.message, 1);
          setStatus("error", "Error");
        }
      };

      // ===== Format =====
      window.format = () => {
        try {
          const src = getSource();
          const result = wasmFormat(src);
          const content = result.content();
          const err = result.err();
          if (err) {
            setProblems(content, 1);
            setStatus("error", "Format failed");
            document.getElementById("bottom-panel").classList.remove("collapsed");
          } else {
            setSource(content);
            setProblems("", 0);
            setStatus("ok", "Formatted");
            setTimeout(() => setStatus("ok", "Ready"), 1500);
          }
        } catch (error) {
          setProblems("Unexpected error: " + error.message, 1);
          setStatus("error", "Error");
        }
      };

      // ===== Change example =====
      window.changeExample = async (name) => {
        const response = await fetch("./examples/" + name);
        if (response.ok) {
          const content = await response.text();
          setSource(content);
        }
      };

      // ===== Event listeners =====

      // Toolbar buttons
      document.getElementById("btn-build").addEventListener("click", window.build);
      document.getElementById("btn-format").addEventListener("click", window.format);
      document.getElementById("exampleSelect").addEventListener("change", function() {
        window.changeExample(this.value);
      });

      // Theme toggle
      document.getElementById("btn-theme").addEventListener("click", () => {
        const current = document.body.getAttribute("data-theme");
        applyTheme(current === "dark" ? "light" : "dark", true);
      });

      // Share URL
      document.getElementById("btn-share").addEventListener("click", () => {
        const src = getSource();
        const encoded = btoa(unescape(encodeURIComponent(src)));
        const url = location.origin + location.pathname + "#code=" + encoded;
        location.hash = "code=" + encoded;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(url).then(() => {
            showToast("URL copied to clipboard!");
          }).catch(() => {
            showToast("URL updated in address bar");
          });
        } else {
          showToast("URL updated in address bar");
        }
      });

      // Copy output
      document.getElementById("btn-copy").addEventListener("click", () => {
        const text = outputEditor.state.doc.toString();
        if (!text) { showToast("No output to copy"); return; }
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(() => {
            showToast("Copied!");
          }).catch(() => { showToast("Copy failed"); });
        } else {
          showToast("Copy requires HTTPS");
        }
      });

      // Help overlay
      const helpOverlay = document.getElementById("help-overlay");
      document.getElementById("btn-help").addEventListener("click", () => {
        helpOverlay.classList.toggle("show");
      });
      document.getElementById("btn-close-help").addEventListener("click", () => {
        helpOverlay.classList.remove("show");
      });
      helpOverlay.addEventListener("click", (e) => {
        if (e.target === helpOverlay) helpOverlay.classList.remove("show");
      });

      // Bottom panel toggle
      document.getElementById("btn-toggle-bottom").addEventListener("click", () => {
        document.getElementById("bottom-panel").classList.toggle("collapsed");
      });

      // Mobile tabs
      document.querySelectorAll(".mobile-tab").forEach(tab => {
        tab.addEventListener("click", () => {
          document.querySelectorAll(".mobile-tab").forEach(t => t.classList.remove("active"));
          tab.classList.add("active");
          const panelName = tab.dataset.panel;
          document.querySelectorAll(".panel").forEach(p => p.classList.remove("mobile-active"));
          document.querySelector(`.panel-${panelName}`).classList.add("mobile-active");
        });
      });

      // ===== Keyboard shortcuts =====
      document.addEventListener("keydown", (e) => {
        const mod = e.ctrlKey || e.metaKey;
        // Ctrl/Cmd + Enter -> Build
        if (mod && e.key === "Enter") {
          e.preventDefault();
          window.build();
        }
        // Ctrl/Cmd + Shift + F -> Format
        if (mod && e.shiftKey && e.key === "F") {
          e.preventDefault();
          window.format();
        }
        // Ctrl/Cmd + S -> Format
        if (mod && e.key === "s") {
          e.preventDefault();
          window.format();
        }
        // Escape -> close help
        if (e.key === "Escape") {
          helpOverlay.classList.remove("show");
        }
      });

      // ===== Gutter (panel resizer) =====
      const gutter = document.getElementById("gutter");
      const panels = document.querySelector(".panels");
      let isDragging = false;

      gutter.addEventListener("mousedown", (e) => {
        isDragging = true;
        gutter.classList.add("dragging");
        document.body.style.cursor = "col-resize";
        document.body.style.userSelect = "none";
        e.preventDefault();
      });

      document.addEventListener("mousemove", (e) => {
        if (!isDragging) return;
        const rect = panels.getBoundingClientRect();
        const fraction = (e.clientX - rect.left) / rect.width;
        const clamped = Math.min(0.8, Math.max(0.2, fraction));
        panels.style.gridTemplateColumns = `${clamped}fr 4px ${1 - clamped}fr`;
      });

      document.addEventListener("mouseup", () => {
        if (!isDragging) return;
        isDragging = false;
        gutter.classList.remove("dragging");
        document.body.style.cursor = "";
        document.body.style.userSelect = "";
      });
    </script>
  </body>
</html>
