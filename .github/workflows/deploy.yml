name: Deploy

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  # Update the language picker in index.hbs to link new languages.
  LANGUAGES: ja

jobs:
  book:
    runs-on: ubuntu-latest
    # sccache + rust-cache keep caches warm across un-pinned veryl git-dep bumps.
    # main saves; PRs (Regression workflow) restore read-only.
    env:
      RUSTC_WRAPPER: sccache
      CARGO_INCREMENTAL: "0"
      SCCACHE_CACHE_SIZE: "3G"
    steps:
      - uses: actions/checkout@v4
        with:
          # We need the full history below.
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: doc-book
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: mozilla-actions/sccache-action@v0.0.10
        with:
          disable_annotations: true
      - uses: actions/cache/restore@v4
        continue-on-error: true
        with:
          path: ~/.cache/sccache
          key: sccache-doc-book-${{ github.sha }}
          restore-keys: sccache-doc-book-
      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v1
        with:
          mdbook-version: '0.5.3'
          #mdbook-version: 'latest'
      - name: Install mdbook-i18n-helpers
        run: |
          cargo install mdbook-i18n-helpers --version 0.4.0
      - name: Install static-sitemap-cli
        run: npm install static-sitemap-cli
      # Cache mdbook-veryl keyed on upstream HEAD; rebuild only when it changes.
      - name: Resolve upstream veryl revision
        id: veryl_rev
        run: echo "sha=$(git ls-remote https://github.com/veryl-lang/veryl HEAD | cut -f1)" >> "$GITHUB_OUTPUT"
      - name: Cache mdbook-veryl binary
        id: cache_mdbook_veryl
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/mdbook-veryl
          key: mdbook-veryl-${{ runner.os }}-${{ steps.veryl_rev.outputs.sha }}
      - name: Build mdbook plugin
        if: steps.cache_mdbook_veryl.outputs.cache-hit != 'true'
        run: cargo install --git https://github.com/veryl-lang/veryl mdbook-veryl
      - name: Replace wasm path for nightly
        if: ${{ ! startsWith(github.ref, 'refs/tags/v') }}
        run: |
          sed -i 's/playground\/pkg\/veryl_wasm.js/nightly\/playground\/pkg\/veryl_wasm.js/g' book/veryl-init.js
      - name: Build mdbook
        run: mdbook build
        working-directory: book
      - name: Build all translations
        working-directory: book
        run: |
          for po_lang in ${{ env.LANGUAGES }}; do
            # Set language and adjust site URL. Clear the redirects
            # since they are in sync with the source files, not the
            # translation.
            MDBOOK_BOOK__LANGUAGE=$po_lang \
            MDBOOK_OUTPUT__HTML__SITE_URL=/veryl/book/$po_lang/ \
            MDBOOK_OUTPUT__HTML__REDIRECT='{}' \
            mdbook build -d book/$po_lang
            echo "::endgroup::"
          done
      - name: Generate sitemap
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        working-directory: book/book
        run: npx sscli --no-clean --base https://doc.veryl-lang.org/book
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: book
          path: book/book/
      - name: sccache stats
        if: always()
        run: sccache --show-stats
      - uses: actions/cache/save@v4
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        with:
          path: ~/.cache/sccache
          key: sccache-doc-book-${{ github.sha }}

  playground:
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
      CARGO_INCREMENTAL: "0"
      SCCACHE_CACHE_SIZE: "3G"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: doc-playground
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: mozilla-actions/sccache-action@v0.0.10
        with:
          disable_annotations: true
      - uses: actions/cache/restore@v4
        continue-on-error: true
        with:
          path: ~/.cache/sccache
          key: sccache-doc-playground-${{ github.sha }}
          restore-keys: sccache-doc-playground-
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Test
        run: cargo test
        working-directory: playground
      - name: Wasm test
        run: wasm-pack test --node
        working-directory: playground
      - name: Build wasm
        run: wasm-pack build --target web -d html/pkg --no-typescript
        working-directory: playground
      - name: Remove .gitignore
        run: rm html/pkg/.gitignore
        working-directory: playground
      - name: Install cargo-about
        run: cargo install cargo-about
      - name: Generate license data
        working-directory: playground
        run: |
          cargo about generate --format json 2>/dev/null | jq '{
            licenses: [.overview[] | {id: .id, name: .name, text: .text}],
            crates: [.crates[] | {
              name: .package.name,
              version: .package.version,
              license: .license,
              url: (.package.repository // ("https://crates.io/crates/" + .package.name)),
              category: "rust"
            }]
          }' > licenses-rust.json
          jq -s '{licenses: (.[0].licenses + .[1].licenses), crates: (.[0].crates + .[1].crates)}' licenses-rust.json licenses-manual.json > html/licenses.json
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: playground
          path: playground/html/
      - name: sccache stats
        if: always()
        run: sccache --show-stats
      - uses: actions/cache/save@v4
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        with:
          path: ~/.cache/sccache
          key: sccache-doc-playground-${{ github.sha }}

  deploy:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [book, playground]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download book
        uses: actions/download-artifact@v4
        with:
          name: book
          path: public/book
      - name: Download playground
        uses: actions/download-artifact@v4
        with:
          name: playground
          path: public/playground
      - name: Copy robots.txt
        run: cp robots.txt public/
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          cname: doc.veryl-lang.org

  deploy-nightly:
    if: ${{ ! startsWith(github.ref, 'refs/tags/v') }}
    needs: [book, playground]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download book
        uses: actions/download-artifact@v4
        with:
          name: book
          path: public/book
      - name: Download playground
        uses: actions/download-artifact@v4
        with:
          name: playground
          path: public/playground
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          cname: doc.veryl-lang.org
          destination_dir: nightly
