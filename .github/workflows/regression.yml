name: Regression

on:
  pull_request:

jobs:
  book:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # We need the full history below.
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v1
        with:
          mdbook-version: '0.4.52'
          #mdbook-version: 'latest'
      - name: Build mdbook plugin
        run: cargo install --git https://github.com/veryl-lang/veryl mdbook-veryl --config 'patch.crates-io.core2.git="https://github.com/bbqsrc/core2"' --config 'patch.crates-io.core2.rev="545e84bcb0f235b12e21351e0c69767958efe2a7"'
      - name: Build mdbook
        run: mdbook build
        working-directory: book

  playground:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Test
        run: cargo test
        working-directory: playground
      - name: Wasm test
        run: wasm-pack test --node
        working-directory: playground
